# Netlify Configuration for Spark Labs Landing Page

[build]
  # Build command
  command = "npm run build"
  
  # Output directory (Vite default)
  publish = "dist"
  
  # Node version (recommended)
  NODE_VERSION = "20"

# Redirect rules for Single Page Application routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    # Content Security Policy - Allow images from external sources and MapLibre GL
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://storage.googleapis.com https://static.vecteezy.com https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com; connect-src 'self' blob: https://*.supabase.co https://*.supabase.in https://ai.gateway.lovable.dev https://maps.googleapis.com https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com wss://localhost:*; worker-src 'self' blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    # Netlify handles HSTS, so we don't need to set it here
    
# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variable secret scanning bypass for Supabase public keys
[build.environment]
  # This ensures Netlify doesn't flag your Supabase anon key as a secret
  REVIEW_ID = "bypass-secret-scanning"
