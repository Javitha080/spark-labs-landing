<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Young Innovators Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;
      color: #ffffff;
      padding: 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Background: radial gradient ── */
    .bg-radial {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(39, 39, 42, 0.5) 0%, #000000 50%, #000000 100%);
    }

    /* ── Blurred color orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      top: 30%;
      right: 20%;
      width: 24rem;
      height: 24rem;
      background: rgba(139, 92, 246, 0.10);
      filter: blur(120px);
      animation: orbPulse 4s ease-in-out infinite;
    }

    .orb-2 {
      bottom: 30%;
      left: 20%;
      width: 20rem;
      height: 20rem;
      background: rgba(59, 130, 246, 0.10);
      filter: blur(100px);
      animation: orbPulse 4s ease-in-out infinite 0.5s;
    }

    @keyframes orbPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    /* ── Noise overlay ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.20;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 10;
      max-width: 40rem;
      padding: 0 1rem;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Icon area ── */
    .icon-area {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
    }

    .icon-glow {
      position: absolute;
      inset: -1rem;
      background: rgba(139, 92, 246, 0.2);
      filter: blur(20px);
      border-radius: 50%;
      animation: orbPulse 3s ease-in-out infinite;
    }

    .icon-main {
      position: relative;
      z-index: 1;
      width: 6rem;
      height: 6rem;
      color: #8b5cf6;
    }

    .icon-badge {
      position: absolute;
      top: -0.75rem;
      right: -1rem;
      z-index: 2;
      width: 2.5rem;
      height: 2.5rem;
      color: rgba(161, 161, 170, 0.5);
      animation: badgeBounce 2s ease-in-out infinite;
    }

    @keyframes badgeBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    /* ── Giant gradient title ── */
    .title-giant {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(to bottom, #ffffff, rgba(255, 255, 255, 0.1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }

    .subtitle {
      font-size: clamp(1.5rem, 4vw, 1.875rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .description {
      font-size: 1.125rem;
      color: rgba(161, 161, 170, 1);
      max-width: 32rem;
      margin: 0 auto 2.5rem;
      line-height: 1.75;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }

    .btn-ghost {
      background: transparent;
      color: rgba(161, 161, 170, 1);
      border: 1px solid transparent;
    }

    .btn-ghost:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.03);
    }

    .btn svg {
      transition: transform 0.2s ease;
    }

    .btn-outline:hover svg {
      transform: scale(1.1);
    }

    /* ── Footer ── */
    .status-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-text {
      font-size: 0.625rem;
      color: rgba(82, 82, 91, 1);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* ── Online restored banner ── */
    .banner {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      background: #ffffff;
      color: #000000;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
    }

    .banner.show {
      top: 2rem;
    }

    /* ── Spin animation ── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinning {
      animation: spin 0.8s linear infinite;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .orb-1 {
        width: 16rem;
        height: 16rem;
        right: -5%;
      }

      .orb-2 {
        width: 14rem;
        height: 14rem;
        left: -5%;
      }
    }
  </style>
</head>

<body>

  <!-- Background layers -->
  <div class="bg-radial"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="noise"></div>

  <!-- Online restored banner -->
  <div class="banner" id="banner">✓ Connection restored — reloading…</div>

  <div class="content">
    <!-- Icon: WiFi Off + Signal badge -->
    <div class="icon-area">
      <div class="icon-glow"></div>
      <!-- WiFi Off icon -->
      <svg class="icon-main" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <circle cx="12" cy="20" r="1" fill="currentColor" />
      </svg>
      <!-- Signal X badge -->
      <svg class="icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
        <line x1="8" y1="8" x2="14" y2="14" />
        <line x1="14" y1="8" x2="8" y2="14" />
      </svg>
    </div>

    <!-- Giant gradient title -->
    <h1 class="title-giant">Offline</h1>

    <h2 class="subtitle">Signal Lost</h2>

    <p class="description">
      Your connection to the YICDVP network has been disrupted.
      <span id="statusText"
        style="display:block; margin-top:0.25rem; font-size:0.875rem; color:rgba(139,92,246,0.8); font-family:monospace; background:rgba(139,92,246,0.1); padding:0.25rem 0.75rem; border-radius:0.25rem; display:inline-block;">
        Reconnecting...
      </span>
    </p>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn btn-outline" id="retryBtn" onclick="handleRetry()">
        <svg id="retryIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        Retry Connection
      </button>
      <button class="btn btn-ghost" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        Go Back
      </button>
    </div>

    <!-- Status footer -->
    <div class="status-footer">
      <p class="status-text">
        System Status: Disconnected // Network: Unavailable
      </p>
    </div>
  </div>

  <script>
    /**
     * Real connectivity check — pings site origin with a tiny HEAD request.
     * navigator.onLine only tells you if a network adapter is connected,
     * NOT if you can reach the internet. This does an actual HTTP probe.
     */
    async function checkConnectivity() {
      try {
        // Append cache-busting param to avoid stale cached responses
        const url = window.location.origin + '/manifest.json?_cb=' + Date.now();
        const response = await fetch(url, {
          method: 'HEAD',
          mode: 'no-cors',       // works even with restrictive CORS
          cache: 'no-store',     // never use cache for this probe
        });
        // no-cors returns opaque response (status 0), but that means it reached the server
        return response.ok || response.type === 'opaque';
      } catch {
        return false;
      }
    }

    /* ── Retry button ── */
    async function handleRetry() {
      const icon = document.getElementById('retryIcon');
      const btn = document.getElementById('retryBtn');
      icon.classList.add('spinning');
      btn.disabled = true;

      const online = await checkConnectivity();
      if (online) {
        onOnline();
      } else {
        icon.classList.remove('spinning');
        btn.disabled = false;
        // Brief visual feedback that retry failed
        const statusEl = document.getElementById('statusText');
        if (statusEl) {
          statusEl.textContent = 'Still offline — check your connection';
          statusEl.style.color = 'rgba(239,68,68,0.8)';
          statusEl.style.background = 'rgba(239,68,68,0.1)';
          setTimeout(() => {
            statusEl.style.color = 'rgba(139,92,246,0.8)';
            statusEl.style.background = 'rgba(139,92,246,0.1)';
          }, 2000);
        }
      }
    }

    /* ── Online restored ── */
    function onOnline() {
      const banner = document.getElementById('banner');
      banner.classList.add('show');
      const statusEl = document.getElementById('statusText');
      if (statusEl) {
        statusEl.textContent = 'Connection restored!';
        statusEl.style.color = 'rgba(34,197,94,0.8)';
        statusEl.style.background = 'rgba(34,197,94,0.1)';
      }
      setTimeout(() => window.location.reload(), 1500);
    }

    /* ── Browser online event (quick trigger, then verify) ── */
    window.addEventListener('online', async () => {
      const reallyOnline = await checkConnectivity();
      if (reallyOnline) onOnline();
    });

    /* ── Background polling with exponential backoff ── */
    let pollInterval = 3000;   // start at 3s
    const MAX_POLL = 30000;    // cap at 30s

    async function pollConnectivity() {
      const online = await checkConnectivity();
      if (online) {
        onOnline();
        return; // stop polling
      }
      // Exponential backoff: 3s → 6s → 12s → 24s → 30s (capped)
      pollInterval = Math.min(pollInterval * 2, MAX_POLL);
      setTimeout(pollConnectivity, pollInterval);
    }

    // Start first poll after 3 seconds
    setTimeout(pollConnectivity, pollInterval);

    /* ── Live status counter ── */
    let secs = 0;
    setInterval(() => {
      secs++;
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      const el = document.getElementById('statusText');
      if (!el) return;
      // Don't overwrite "Connection restored!" or "Still offline" feedback
      if (el.textContent.includes('restored') || el.textContent.includes('Still offline')) return;
      const txt = m > 0
        ? `Offline for ${m}m ${s}s`
        : `Reconnecting... (${s}s)`;
      el.textContent = txt;
    }, 1000);
  </script>
</body>

</html>
