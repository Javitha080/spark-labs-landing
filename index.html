  <!-- Service Worker Registration with offline detection & update handling -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('[App] SW registered, scope:', reg.scope);

            // Check for updates every 60 minutes
            setInterval(() => {
              reg.update().catch(() => { /* offline, skip */ });
            }, 60 * 60 * 1000);

            // Listen for new SW waiting to activate
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available — notify user
                  window.dispatchEvent(new CustomEvent('sw-update-available'));
                  console.log('[App] New SW version available');
                }
              });
            });

            // Listen for SW online/offline broadcasts
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data && event.data.type === 'ONLINE_STATUS') {
                const isOnline = event.data.payload.isOnline;
                document.documentElement.classList.toggle('offline', !isOnline);
                window.dispatchEvent(new CustomEvent('sw-online-status', {
                  detail: { isOnline }
                }));
              }
            });
          })
          .catch((err) => {
            console.warn('[App] SW registration failed:', err.message);
          });

        // Auto-reload when a new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });

      // Forward browser online/offline events to the SW
      window.addEventListener('online', () => {
        navigator.serviceWorker.controller?.postMessage({ type: 'CHECK_ONLINE' });
      });
      window.addEventListener('offline', () => {
        document.documentElement.classList.add('offline');
        window.dispatchEvent(new CustomEvent('sw-online-status', {
          detail: { isOnline: false }
        }));
      });
    }
  </script>
